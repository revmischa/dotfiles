# herdr configuration
# Place this file at ~/.config/herdr/config.toml
# Regenerate the annotated default with: herdr --default-config

# Show first-run notification setup on startup.
# Missing also shows onboarding; set false after you've chosen.
onboarding = false

[theme]
# Built-in themes: catppuccin, terminal, tokyo-night, dracula, nord,
#                  gruvbox, one-dark, solarized, kanagawa, rose-pine,
#                  vesper
name = "catppuccin"

# Override individual color tokens on top of the base theme.
# Accepts: hex (#rrggbb), named colors, rgb(r,g,b), or panel_bg = "reset"
# [theme.custom]
# panel_bg = "reset"
# accent = "#f5c2e7"

[terminal]
# Executable used for new interactive panes.
# Empty means $SHELL, then /bin/sh.
default_shell = "zsh"

# CWD policy for new panes, tabs, and workspaces when no explicit --cwd is provided.
# Use "follow" to inherit the source pane/workspace, "home" for $HOME,
# "current" for Herdr's process directory, or a fixed path such as "~/Projects".
new_cwd = "follow"

[keys]
# Prefix key to enter prefix mode (default: "ctrl+b")
# prefix = "ctrl+b"
previous_workspace = "alt+shift+up"
next_workspace = "alt+shift+down"

# Run lazygit in a temporary pane.
[[keys.command]]
key = "prefix+ctrl+q"
type = "pane"
command = "lazygit"

# Indexed direct-jump bindings. ctrl+shift+1..9 jumps straight to a workspace
# (one per worktree), the same way prefix+1..9 jumps to a tab.
[keys.indexed]
workspaces = "ctrl+shift"

[worktrees]
# Agent-agnostic root shared with Claude Code (see the WorktreeCreate hook at
# ~/.claude/hooks/forest-worktree.sh). herdr lays out <root>/<repo>/<name>.
directory = "~/.forest"

[ui]
# Accent color for highlights, borders, and navigation UI.
# accent = "cyan"

# Background notification popup delivery
[ui.toast]
# off = disable, herdr = in-app toasts, terminal = outer terminal, system = OS
delivery = "terminal"

# Play sounds when agents change state in background workspaces
[ui.sound]
enabled = false

[session]
# Resume supported AI-agent panes into their native conversation sessions after
# a herdr server restart. Requires integrations that report session refs.
resume_agents_on_restore = true
